<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Таро Расклад</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * {margin:0;padding:0;box-sizing:border-box;}
  body {background: linear-gradient(135deg,#1a1e2b,#2a1f2d);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        display:flex;justify-content:center;align-items:center;min-height:100vh;color:#fff;padding:16px;}
  .container {display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:400px;gap:32px;}
  .cards-area {display:flex;justify-content:center;align-items:center;gap:16px;flex-wrap:wrap;width:100%;padding:16px 8px;min-height:240px;}
  .card {width:100px;height:160px;background-size:cover;background-position:center;border-radius:16px;
        box-shadow:0 10px 20px rgba(0,0,0,0.5),0 0 0 2px rgba(255,215,0,0.2) inset;transition: transform 0.3s ease, box-shadow 0.3s ease;flex-shrink:0;}
  .card:hover {transform:translateY(-8px);box-shadow:0 18px 25px rgba(0,0,0,0.6),0 0 0 3px rgba(255,215,0,0.4) inset;}
  .button-container {width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0 24px;}
  .btn {background:linear-gradient(145deg,#e6b566,#d4a259);border:none;padding:16px 40px;border-radius:40px;
        font-size:22px;font-weight:600;color:#1e1a22;cursor:pointer;box-shadow:0 8px 0 #8b6c3d,0 10px 20px rgba(0,0,0,0.4);
        transition:all 0.1s ease;letter-spacing:1px;width:fit-content;min-width:200px;text-transform:uppercase;}
  .btn:active {transform:translateY(6px);box-shadow:0 2px 0 #8b6c3d,0 5px 12px rgba(0,0,0,0.4);}
  .btn:disabled {opacity:0.6;transform:translateY(4px);box-shadow:0 4px 0 #8b6c3d;pointer-events:none;}
  .debug-status {font-size:12px;color:#a0a0a0;background:rgba(0,0,0,0.3);padding:8px 16px;border-radius:20px;max-width:100%;word-break:break-all;text-align:center;}
  @media(max-width:380px){.cards-area{gap:8px}.card{width:85px;height:136px;}}
</style>
</head>
<body>
<div class="container">
  <div class="cards-area" id="cardsArea"></div>
  <div class="button-container">
    <button class="btn" id="spreadButton">Расклад</button>
    <button class="btn" id="closeButton">Закрыть</button>
    <div class="debug-status" id="debugStatus">Ожидание...</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand(); tg.ready();

const baseUrl = 'https://shinobeeee-collab.github.io';
const cardsFolder = '/cards/';
const backCard = baseUrl + cardsFolder + 'oblojcka.jpg';
const tarotCards = [
  {file:'mag.jpg',name:'Маг',nameEn:'Magician'},
  {file:'shut.jpg',name:'Шут',nameEn:'Fool'},
  {file:'verhovaya-zhrica.jpg',name:'Верховная Жрица',nameEn:'High Priestess'},
  {file:'imperatrica.jpg',name:'Императрица',nameEn:'Empress'}
];
const N8N_WEBHOOK_URL='https://koala22.app.n8n.cloud/webhook-test/fortune';

const debugStatus=document.getElementById('debugStatus');
const cardsArea=document.getElementById('cardsArea');
const spreadButton=document.getElementById('spreadButton');
const closeButton=document.getElementById('closeButton');

let currentSpread=[];
let isSending=false;

function updateStatus(msg,isError=false){
  debugStatus.textContent=msg;
  debugStatus.style.color=isError?'#ff6b6b':'#a0a0a0';
  console.log('Статус:',msg);
}

// Создание карт
for(let i=0;i<3;i++){
  const card=document.createElement('div');
  card.className='card';
  card.style.backgroundImage=`url('${backCard}')`;
  card.dataset.flipped='false';
  card.dataset.position=i+1;
  cardsArea.appendChild(card);
}

function getRandomUniqueCards(count){
  const shuffled=[...tarotCards];
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  return shuffled.slice(0,Math.min(count,shuffled.length));
}

async function sendToN8N(spread){
  if(isSending){updateStatus('⏳ Отправка уже выполняется...');return;}
  isSending=true;
  spreadButton.disabled=true; closeButton.disabled=true;
  updateStatus('🔄 Отправка данных в n8n...');
  const user=tg.initDataUnsafe?.user||{};
  const chat=tg.initDataUnsafe?.chat||{};
  const payload={
    event:'tarot_spread',
    timestamp:new Date().toISOString(),
    user:{id:user.id||null,firstName:user.first_name||'',lastName:user.last_name||'',username:user.username||'',languageCode:user.language_code||''},
    chat:chat,
    userId:user.id||null,
    chatId:chat.id||user.id||null,
    spread:spread.map((c,i)=>({position:i+1,cardFile:c.file,cardName:c.name,cardNameEn:c.nameEn,imageUrl:baseUrl+cardsFolder+c.file}))
  };
  try{
    console.log('Отправка в n8n:',payload);
    const response=await fetch(N8N_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    updateStatus(response.ok?'✅ Успешно отправлено!':`❌ Ошибка ${response.status}`,!response.ok);
  }catch(e){
    updateStatus(`❌ Ошибка: ${e.message}`,true);
    console.error(e);
  }finally{
    isSending=false;
    spreadButton.disabled=false; closeButton.disabled=false;
  }
}

// Расклад
spreadButton.addEventListener('click',async()=>{
  updateStatus('🎴 Выбираем карты...');
  const selected=getRandomUniqueCards(3);
  currentSpread=selected;
  const cards=document.querySelectorAll('.card');
  for(let i=0;i<cards.length;i++){
    const card=cards[i];
    if(card.dataset.flipped==='false'){
      await new Promise(r=>setTimeout(r,200));
      card.style.backgroundImage=`url('${baseUrl+cardsFolder+selected[i].file}')`;
      card.dataset.flipped='true';
      card.style.transform='scale(1.05)';
      setTimeout(()=>{card.style.transform='';},200);
    }
  }
  await sendToN8N(selected);
  if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
});

// Закрытие
closeButton.addEventListener('click',async()=>{
  if(currentSpread.length===0){updateStatus('⚠️ Сначала сделайте расклад',true);return;}
  updateStatus('🔒 Закрываем приложение и отправляем данные...');
  await sendToN8N(currentSpread);
  tg.close();
});

// Анимация появления
window.addEventListener('load',()=>{
  const cards=document.querySelectorAll('.card');
  cards.forEach((card,i)=>{
    card.style.opacity='0';
    card.style.transform='translateY(30px)';
    setTimeout(()=>{
      card.style.transition='opacity 0.4s ease, transform 0.4s ease';
      card.style.opacity='1';
      card.style.transform='';
    },100+i*100);
  });
  updateStatus('Готово');
});
</script>
</body>
</html>
