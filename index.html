<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Таро Расклад</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Сброс стилей */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1e2b, #2a1f2d);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      padding: 16px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 400px;
      gap: 32px;
    }

    .cards-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      width: 100%;
      padding: 16px 8px;
      min-height: 240px;
    }

    .card {
      width: 100px;
      height: 160px;
      background-size: cover;
      background-position: center;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5),
                  0 0 0 2px rgba(255, 215, 0, 0.2) inset;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      flex-shrink: 0;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 25px rgba(0, 0, 0, 0.6),
                  0 0 0 3px rgba(255, 215, 0, 0.4) inset;
    }

    .button-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px 0 24px;
    }

    .btn {
      background: linear-gradient(145deg, #e6b566, #d4a259);
      border: none;
      padding: 16px 40px;
      border-radius: 40px;
      font-size: 22px;
      font-weight: 600;
      color: #1e1a22;
      cursor: pointer;
      box-shadow: 0 8px 0 #8b6c3d,
                  0 10px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.1s ease;
      letter-spacing: 1px;
      width: fit-content;
      min-width: 200px;
      text-transform: uppercase;
    }

    .btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #8b6c3d,
                  0 5px 12px rgba(0, 0, 0, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      transform: translateY(4px);
      box-shadow: 0 4px 0 #8b6c3d;
      pointer-events: none;
    }

    .debug-status {
      font-size: 12px;
      color: #a0a0a0;
      background: rgba(0,0,0,0.3);
      padding: 8px 16px;
      border-radius: 20px;
      max-width: 100%;
      word-break: break-all;
      text-align: center;
    }

    @media (max-width: 380px) {
      .cards-area { gap: 8px; }
      .card { width: 85px; height: 136px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="cards-area" id="cardsArea">
      <!-- Карты будут созданы скриптом -->
    </div>

    <div class="button-container">
      <button class="btn" id="spreadButton">Расклад</button>
      <div class="debug-status" id="debugStatus">Ожидание...</div>
    </div>
  </div>

  <script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // --- НАСТРОЙКА КАРТ ---
    const baseUrl = 'https://shinobeeee-collab.github.io';
    const cardsFolder = '/cards/';
    const backCard = `${baseUrl + cardsFolder}oblojcka.jpg`;

const tarotCards = [
  { file: 'shut.jpg', name: 'Шут', nameEn: 'Fool' },
  { file: 'mag.jpg', name: 'Маг', nameEn: 'Magician' },
  { file: 'verhovaya-zhrica.jpg', name: 'Верховная Жрица', nameEn: 'High Priestess' },
  { file: 'imperatrica.jpg', name: 'Императрица', nameEn: 'Empress' },
  { file: 'imperator.jpg', name: 'Император', nameEn: 'Emperor' },
  { file: 'verhovnyi-zhrec.jpg', name: 'Верховный Жрец', nameEn: 'Hierophant' },
  { file: 'vlublennye.jpg', name: 'Влюблённые', nameEn: 'Lovers' }
];

    // --- URL N8N ---
    const N8N_WEBHOOK_URL = 'https://koala22.app.n8n.cloud/webhook/fortune';

    // --- ЭЛЕМЕНТЫ ДЛЯ ОТЛАДКИ ---
    const debugStatus = document.getElementById('debugStatus');

    // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
    let currentSpread = [];
    let isSending = false;

    // --- ФУНКЦИЯ ОБНОВЛЕНИЯ СТАТУСА ---
    function updateStatus(message, isError = false) {
      debugStatus.textContent = message;
      debugStatus.style.color = isError ? '#ff6b6b' : '#a0a0a0';
      console.log('Статус:', message);
    }

    // --- СОЗДАНИЕ КАРТ ---
    const cardsArea = document.getElementById('cardsArea');
    const spreadButton = document.getElementById('spreadButton');

    for (let i = 0; i < 3; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${backCard}')`;
      card.dataset.flipped = 'false';
      card.dataset.position = i + 1;
      cardsArea.appendChild(card);
    }

    // --- СЛУЧАЙНЫЙ ВЫБОР КАРТ ---
    function getRandomUniqueCards(count) {
      if (tarotCards.length === 0) return [];
      const shuffled = [...tarotCards];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, Math.min(count, shuffled.length));
    }

    // --- ОТПРАВКА В N8N ---
    async function sendToN8N(spread) {
      if (isSending) {
        updateStatus('⏳ Отправка уже выполняется...');
        return;
      }

      isSending = true;
      spreadButton.disabled = true;
      updateStatus('🔄 Отправка данных в n8n...');

      const user = tg.initDataUnsafe?.user || {};
      const payload = {
        event: 'tarot_spread',
        timestamp: new Date().toISOString(),
        user: {
          id: user.id || null,
          firstName: user.first_name || '',
          lastName: user.last_name || '',
          username: user.username || '',
          languageCode: user.language_code || ''
        },
        chat: tg.initDataUnsafe?.chat || {},
        spread: spread.map((card, index) => ({
          position: index + 1,
          cardFile: card.file,
          cardName: card.name,
          cardNameEn: card.nameEn,
          imageUrl: `${baseUrl + cardsFolder + card.file}`
        }))
      };

      try {
        updateStatus('📤 Отправка POST запроса...');
        console.log('Отправляемые данные:', payload);

        const response = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        updateStatus(`📥 Статус ответа: ${response.status}`);
        const responseText = await response.text();
        console.log('Текст ответа:', responseText);

        if (response.ok) {
          updateStatus('✅ Успешно отправлено!');
          try {
            const responseData = JSON.parse(responseText);
            console.log('Данные ответа:', responseData);
          } catch {
            console.log('Ответ не в JSON формате:', responseText);
          }
        } else {
          updateStatus(`❌ Ошибка ${response.status}`, true);
        }

      } catch (error) {
        updateStatus(`❌ Ошибка: ${error.message}`, true);
        console.error('Детали ошибки:', error);
      } finally {
        isSending = false;
        setTimeout(() => {
          spreadButton.disabled = false;
          updateStatus('Ожидание...');
        }, 3000);
      }
    }

    // --- ОБРАБОТЧИК КНОПКИ ---
    spreadButton.addEventListener('click', async () => {
      updateStatus('🎴 Выбираем карты...');
      const selectedCards = getRandomUniqueCards(3);
      currentSpread = selectedCards;

      const cards = document.querySelectorAll('.card');

      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (card.dataset.flipped === 'false') {
          await new Promise(resolve => setTimeout(resolve, 200));
          card.style.backgroundImage = `url('${baseUrl + cardsFolder + selectedCards[i].file}')`;
          card.dataset.flipped = 'true';
          card.style.transform = 'scale(1.05)';
          setTimeout(() => card.style.transform = '', 200);
        }
      }

      await sendToN8N(selectedCards);

      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('medium');
      }
    });

    // --- АНИМАЦИЯ ПОЯВЛЕНИЯ ---
    window.addEventListener('load', () => {
      const cards = document.querySelectorAll('.card');
      cards.forEach((card, index) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(30px)';
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          card.style.opacity = '1';
          card.style.transform = '';
        }, 100 + index * 100);
      });
      updateStatus('Готово');
    });
  </script>
</body>
</html>
