 <script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const baseUrl = 'https://shinobeeee-collab.github.io';
const cardsFolder = '/cards/';

const backCard = baseUrl + cardsFolder + 'oblojcka.jpg';

const tarotCards = [
  { file: 'mag.jpg', name: 'Маг', nameEn: 'Magician' },
  { file: 'shut.jpg', name: 'Шут', nameEn: 'Fool' },
  { file: 'verhovaya-zhrica.jpg', name: 'Верховная Жрица', nameEn: 'High Priestess' },
  { file: 'imperatrica.jpg', name: 'Императрица', nameEn: 'Empress' }
];

// Ваш webhook n8n
const N8N_WEBHOOK_URL = 'https://koala22.app.n8n.cloud/webhook-test/fortune';

// Функция для выбора случайных уникальных карт
function getRandomUniqueCards(count) {
  const shuffled = [...tarotCards];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

// Функция отправки JSON в n8n
async function sendToN8N(spread) {
  const payload = {
    chatId: tg.initDataUnsafe?.chat?.id || tg.initDataUnsafe?.user?.id || null,
    user: {
      id: tg.initDataUnsafe?.user?.id || null,
      firstName: tg.initDataUnsafe?.user?.first_name || '',
      lastName: tg.initDataUnsafe?.user?.last_name || '',
      username: tg.initDataUnsafe?.user?.username || '',
      languageCode: tg.initDataUnsafe?.user?.language_code || ''
    },
    spread: spread.map((card, index) => ({
      position: index + 1,
      cardFile: card.file,
      cardName: card.name,
      cardNameEn: card.nameEn,
      imageUrl: baseUrl + cardsFolder + card.file
    })),
    timestamp: new Date().toISOString()
  };

  console.log('Отправка в n8n:', payload);

  try {
    const response = await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    console.log('Статус ответа n8n:', response.status);
  } catch (error) {
    console.error('Ошибка отправки в n8n:', error);
  }
}

// Кнопка для расклада
const spreadButton = document.getElementById('spreadButton');

spreadButton.addEventListener('click', async () => {
  const selectedCards = getRandomUniqueCards(3);

  const cards = document.querySelectorAll('.card');
  for (let i = 0; i < cards.length; i++) {
    cards[i].style.backgroundImage = `url('${baseUrl + cardsFolder + selectedCards[i].file}')`;
    cards[i].dataset.flipped = 'true';
  }

  await sendToN8N(selectedCards);

  if (tg.HapticFeedback) {
    tg.HapticFeedback.impactOccurred('medium');
  }
});
</script>
